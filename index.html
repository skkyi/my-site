<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkY?</title>
    <style>
        /* إعدادات الصفحة الأساسية */
        body {
            margin: 0; padding: 0;
            background-color: #050505;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            flex-direction: column;
        }

        /* --- شاشة الترحيب السوداء --- */
        #intro-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #000000;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; /* تكون فوق كل شيء */
            transition: opacity 1.5s ease; /* سرعة الاختفاء التدريجي */
        }
        .intro-text-wrapper {
            /* لتمركز الكتابة تماماً */
            display: flex;
            justify-content: center;
            width: 100%;
        }
        .intro-text {
            color: #ffffff;
            font-size: 24px;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 2px;
            border-right: 2px solid #fff;
            padding-right: 5px;
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            /* عرض محدد للنص عشان ما ينسحب يسار */
            animation: intro-typing 1.5s steps(20, end) forwards;
        }
        @keyframes intro-typing {
            /* عرض النص في النهاية (بالبكسل عشان الثبات) */
            from { width: 0 }
            to { width: 330px; } /* عدلتها عشان تناسب طول الجملة بالضبط */
        }

        /* تنسيق الصورة الدائرية */
        .profile-img {
            width: 120px; height: 120px;
            border-radius: 50%; border: 3px solid #ffffff;
            box-shadow: 0 10px 30px rgba(255,255,255,0.2);
            object-fit: cover; margin-bottom: 25px; z-index: 10;
        }

        /* المربع الزجاجي */
        .glass-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px 25px;
            width: 320px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.9);
        }

        /* تأثير الكتابة SKy المتكرر */
        .typewriter {
            font-family: 'Courier New', Courier, monospace;
            font-size: 35px; color: #ffffff;
            overflow: hidden; border-right: 3px solid #808080;
            white-space: nowrap; margin: 0 auto 35px; width: 0;
            animation: typing 3s steps(3, end) infinite, blink 0.8s infinite;
        }
        @keyframes typing { 0%, 10% { width: 0; } 50%, 90% { width: 75px; } 100% { width: 0; } }
        @keyframes blink { 50% { border-color: transparent } }

        /* تنسيق الخانات */
        .links { display: flex; flex-direction: column; gap: 14px; }
        .link-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff; text-decoration: none; padding: 15px;
            border-radius: 12px; font-size: 16px; font-weight: 800;
            transition: all 0.3s ease-in-out; display: block;
        }
        .link-item:hover {
            background: #ffffff; color: #000000;
            transform: scale(1.02); box-shadow: 0 0 20px rgba(255,255,255,0.4);
        }

        .footer-info {
            margin-top: 25px;
            display: flex; flex-direction: column;
            gap: 10px; align-items: center;
        }
        .dev-by { font-size: 12px; color: #808080; font-weight: 600; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="intro-text-wrapper">
            <div class="intro-text">Welcome to Info Sky</div>
        </div>
    </div>

    <img src="profile.webp" alt="SKy Profile" class="profile-img">

    <div class="glass-box">
        <div class="typewriter">SKy</div>
        
        <div class="links">
            <a href="https://discord.com/users/1187826589031989258" class="link-item" target="_blank">Discord</a>
            <a href="https://discord.gg/69l" class="link-item" target="_blank">Server Sixty Nine</a>
            <a href="https://www.instagram.com/ry.i?igsh=MXMxYW41ZWs4MTIzYQ%3D%3D&utm_source=qr" class="link-item" target="_blank">Instagram</a>
            <a href="https://www.tiktok.com/@.rrr?_r=1&_t=ZS-95Y2co5BCqK" class="link-item" target="_blank">TikTok</a>
        </div>

        <div class="footer-info">
            <div class="dev-by">Dev By : Sky</div>
        </div>
    </div>

    <script>
        // تحريك عنوان التبويبة
        let titleText = "SkY? ";
        setInterval(() => {
            titleText = titleText.substring(1) + titleText.substring(0, 1);
            document.title = titleText;
        }, 300);

        // إخفاء شاشة الترحيب تدريجياً بعد ثانيتين
        window.addEventListener('load', () => {
            setTimeout(() => {
                const intro = document.getElementById('intro-screen');
                intro.style.opacity = '0';
                setTimeout(() => {
                    intro.style.display = 'none';
                }, 1500); // إزالة العنصر تماماً بعد انتهاء الأنيميشن
            }, 2000); // مدة بقاء الرسالة (ثانيتين)
        });
    </script>

</body>
</html>
