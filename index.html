<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKy | Hub</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #050505;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
            font-family: 'Courier New', Courier, monospace; /* خط برمجى بايثون */
        }
        
        .bg-code {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            color: #0f0; opacity: 0.05; font-size: 10px; white-space: pre;
            z-index: -1; animation: slide 20s linear infinite;
        }
        @keyframes slide { from { transform: translateY(0); } to { transform: translateY(-50%); } }

        .glass-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px 20px;
            width: 300px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        /* تأثير الكتابة المتكرر */
        .typewriter {
            font-size: 32px;
            color: #ffffff; /* النص أبيض */
            overflow: hidden;
            border-right: 3px solid #808080; /* مؤشر رصاصي */
            white-space: nowrap;
            margin: 0 auto 30px;
            width: 0;
            animation: 
                typing 3s steps(3, end) infinite, /* تكرار الكتابة */
                blink 0.8s infinite;
        }
        @keyframes typing { 
            0%, 10% { width: 0; }
            50%, 90% { width: 70px; } /* عرض كلمة SKy */
            100% { width: 0; }
        }
        @keyframes blink { 50% { border-color: transparent } }

        .links { display: flex; flex-direction: column; gap: 12px; }
        .link-item {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #eee; text-decoration: none; padding: 14px;
            border-radius: 12px; font-size: 13px; transition: 0.3s;
            font-weight: 500;
        }
        .link-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #0f0; /* حدود خضراء عند التأشير */
            transform: translateY(-2px);
        }

        .dev-by {
            margin-top: 25px;
            font-size: 11px;
            color: #808080; /* رصاصي */
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="bg-code">
        # SKy Hub Initialization...
        import time
        import sys
        def animate_name():
            name = "SKy"
            for char in name:
                sys.stdout.write(char)
                time.sleep(0.1)
        # Running profile...
    </div>
    <div class="glass-box">
        <div class="typewriter">SKy</div>

            <a href="https://www.instagram.com/ry.i?igsh=MXMxYW41ZWs4MTIzYQ%3D%3D&utm_source=qr" class="link-item" target="_blank">Instagram</a>
            <a href="https://www.tiktok.com/@.rrr?_r=1&_t=ZS-95Y2co5BCqK" class="link-item" target="_blank">TikTok</a>
        </div>
        <div class="dev-by">Dev By : Sky</div>
    </div>
</body>
</html>
