<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkY?</title>
    <style>
        /* إعدادات الصفحة الأساسية */
        body {
            margin: 0; padding: 0;
            background-color: #050505;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            flex-direction: column;
            color: white;
        }

        /* لوحة النقاط المتحركة خلفية */
        #particleCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1; /* خلف المربع الزجاجي */
            pointer-events: none;
        }

        /* --- شاشة الترحيب السوداء --- */
        #intro-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #000000;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 1.5s ease;
        }
        .intro-text-wrapper {
            display: flex; justify-content: center; width: 100%;
        }
        .intro-text {
            color: #ffffff;
            font-size: 24px;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 2px;
            border-right: 2px solid #fff;
            padding-right: 5px;
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            animation: intro-typing 1.5s steps(20, end) forwards;
        }
        @keyframes intro-typing {
            from { width: 0 }
            to { width: 330px; }
        }

        /* التنسيق الأساسي للمحتوى */
        .profile-img {
            width: 120px; height: 120px;
            border-radius: 50%; border: 3px solid #ffffff;
            box-shadow: 0 10px 30px rgba(255,255,255,0.2);
            object-fit: cover; margin-bottom: 25px; z-index: 10;
        }

        .glass-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px 25px;
            width: 320px; text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.9);
            z-index: 10; /* فوق النقاط */
        }

        .typewriter {
            font-family: 'Courier New', Courier, monospace;
            font-size: 35px; color: #ffffff;
            overflow: hidden; border-right: 3px solid #808080;
            white-space: nowrap; margin: 0 auto 35px; width: 0;
            animation: typing 3s steps(3, end) infinite, blink 0.8s infinite;
        }
        @keyframes typing { 0%, 10% { width: 0; } 50%, 90% { width: 75px; } 100% { width: 0; } }
        @keyframes blink { 50% { border-color: transparent } }

        .links { display: flex; flex-direction: column; gap: 14px; }
        .link-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #ffffff; text-decoration: none; padding: 15px;
            border-radius: 12px; font-size: 16px; font-weight: 800;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: block;
        }
        .link-item:hover {
            background: #ffffff; color: #000000;
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 10px 25px rgba(255,255,255,0.3);
        }

        .footer-info { margin-top: 25px; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .dev-by { font-size: 12px; color: #808080; font-weight: 600; letter-spacing: 1px; }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <div id="intro-screen">
        <div class="intro-text-wrapper">
            <div class="intro-text">Welcome to Info Sky</div>
        </div>
    </div>

    <img src="profile.webp" alt="SKy Profile" class="profile-img">

    <div class="glass-box">
        <div class="typewriter">SKy</div>
        
        <div class="links">
            <a href="https://discord.com/users/1187826589031989258" class="link-item" target="_blank">Discord</a>
            <a href="https://discord.gg/69L" class="link-item" target="_blank">Server Sixty Nine</a>
            <a href="https://www.instagram.com/ry.i?igsh=MXMxYW41ZWs4MTIzYQ%3D%3D&utm_source=qr" class="link-item" target="_blank">Instagram</a>
            <a href="https://www.tiktok.com/@.rrr?_r=1&_t=ZS-95Y2co5BCqK" class="link-item" target="_blank">TikTok</a>
        </div>

        <div class="footer-info">
            <div class="dev-by">Dev By : Sky</div>
        </div>
    </div>

    <script>
        // 1. نظام النقاط والخطوط التفاعلية (The Constellation Script)
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];
        const numberOfParticles = 70; // خففت العدد قليلاً عشان الخطوط ما تستهلك المعالج

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const mouse = { x: null, y: null };
        window.addEventListener('mousemove', (event) => {
            mouse.x = event.x;
            mouse.y = event.y;
        });

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 0.8 - 0.4; // سرعة حركة النقاط
                this.speedY = Math.random() * 0.8 - 0.4;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                
                // تأثير الجذب المغناطيسي للماوس
                if (distance < 120) {
                    this.x += dx * 0.02;
                    this.y += dy * 0.02;
                }

                if (this.x > canvas.width || this.x < 0) this.speedX *= -1;
                if (this.y > canvas.height || this.y < 0) this.speedY *= -1;
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // دالة رسم الخطوط بين النقاط المتقاربة
        function connect() {
            let opacityValue = 1;
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let dx = particlesArray[a].x - particlesArray[b].x;
                    let dy = particlesArray[a].y - particlesArray[b].y;
                    let distance = Math.sqrt(dx * dx + dy * dy);

                    // إذا كانت المسافة بين نقطتين أقل من 100 بكسل، ارسم خطاً
                    if (distance < 100) {
                        opacityValue = 1 - (distance / 100); // كل ما بعدت، الخط يختفي
                        ctx.strokeStyle = `rgba(255, 255, 255, ${opacityValue})`;
                        ctx.lineWidth = 0.5; // سمك الخط رفيع جداً لفخامة أكثر
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function init() {
            particlesArray = []; // تنظيف المصفوفة قبل البدء
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            connect(); // استدعاء دالة التوصيل بعد تحديث النقاط
            requestAnimationFrame(animate);
        }

        init();
        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init(); // إعادة تهيئة النقاط لتناسب حجم الشاشة الجديد
        });

        // 2. تحريك عنوان التبويبة
        let titleText = "SkY? ";
        setInterval(() => {
            titleText = titleText.substring(1) + titleText.substring(0, 1);
            document.title = titleText;
        }, 300);

        // 3. إخفاء شاشة الترحيب
        window.addEventListener('load', () => {
            setTimeout(() => {
                const intro = document.getElementById('intro-screen');
                intro.style.opacity = '0';
                setTimeout(() => {
                    intro.style.display = 'none';
                }, 1500);
            }, 2000);
        });
    </script>

</body>
</html>
